[project]
authors = [{name = "wc-caldwell", email = "wccaldwe@syr.edu"}]
dependencies = []
name = "Transboundary_Opera"
requires-python = ">= 3.10"
version = "0.1.0"

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64", "osx-64"]

[tool.pixi.pypi-dependencies]
transboundary_opera = { path = ".", editable = true }

# need to run something like pixi run -e operaapp python -m ipykernel install --user --name operaapp --display-name "Python (operaapp)"
[tool.pixi.feature.operaapp.dependencies]
python = "3.11.*"
mintpy = ">=1.6.3,<2"
libgdal-hdf5 = ">=3.12.1,<4"
libgdal-netcdf = ">=3.12.1,<4"

[tool.pixi.feature.operaapp.pypi-dependencies]
ipykernel = ">=7.1.0,<8"
opera-utils = { version = ">=0.25.3,<0.26", extras = ["all"] }
asf-search = ">=11.0.0,<12"
ultraplot = ">=1.66.0,<2"
boto3 = ">=1.41.5,<2"
botocore = ">=1.41.5,<2"
netcdf4 = ">=1.7.3,<2"
jax = ">=0.4.38,<0.9"
dem-stitcher = ">=2.5.12,<3"
tile-mate = ">=0.0.15,<0.0.16"
earthaccess = ">=0.15.1,<0.16"

[tool.pixi.environments]
operaapp = ["operaapp"]

[tool.pixi.tasks]
lab = "jupyter lab --no-browser --port=8888"

[tool.pixi.dependencies]
jupyterlab = ">=4.5.6,<5"
bash_kernel = ">=0.7.2,<0.11"
pixi-kernel = ">=0.7.1,<0.8"
ipywidgets = ">=8.1.8,<9"
r-irkernel = ">=1.3.2,<2"
ipykernel = ">=7.2.0,<8"
